<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelime Kartları — İngilizce Ezberleme</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #e0e0e0;
      --text2: #b0b0b0;
      --text3: #757575;
      --green: #7cb342;
      --green-bg: #2e3d24;
      --green-text: #aed581;
      --red-bg: #4c2424;
      --red-text: #e57373;
      --red-border: rgba(229,115,115,0.3);
      --green-border: rgba(174,213,129,0.3);
      --warn-bg: #413520;
      --warn-text: #ffe082;
      --info-bg: #1a364a;
      --info-text: #81d4fa;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem 1rem 3rem;
    }

    .app { width: 100%; max-width: 620px; }

    /* Score bar */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 18px;
      margin-bottom: 1.25rem;
    }
    .score-bar .brand { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; color: #fff; }
    .score-pills { display: flex; gap: 8px; }
    .pill {
      font-size: 13px; font-weight: 500;
      padding: 4px 12px;
      border-radius: var(--radius);
      display: flex; align-items: center; gap: 4px;
    }
    .pill.correct { background: var(--green-bg); color: var(--green-text); }
    .pill.wrong   { background: var(--red-bg);   color: var(--red-text);   }

    /* Alert */
    .alert {
      font-size: 13px; padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      display: none;
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 0.5px solid rgba(255,224,130,0.2);
    }
    .alert.show { display: block; }

    /* Card / Section */
    .section {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 12px; font-weight: 500; color: var(--text3);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 6px;
    }

    /* Inputs */
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    input[type=text] {
      width: 100%; padding: 9px 12px; font-size: 14px;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--surface2); color: var(--text);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input[type=text]::placeholder { color: var(--text3); }
    input[type=text]:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(124,179,66,.15); }

    /* Buttons */
    .btn {
      cursor: pointer; padding: 9px 16px; font-size: 14px; font-weight: 500;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--surface2); color: var(--text);
      transition: all .15s; width: 100%;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn:hover { background: #333333; border-color: rgba(255,255,255,0.25); }
    .btn:active { transform: scale(.98); }
    .btn.primary { background: var(--green); border-color: var(--green); color: #121212; font-weight: 600; }
    .btn.primary:hover { background: var(--green-text); border-color: var(--green-text); }
    .btn.danger-btn { border-color: var(--red-border); color: var(--red-text); background: rgba(229,115,115,0.05); }
    .btn.danger-btn:hover { background: var(--red-bg); }
    .btn:disabled { opacity: .3; cursor: not-allowed; }

    /* Game selector */
    .game-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* Word list */
    .word-list { margin-top: 1rem; display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
    .word-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; background: var(--surface2);
      border-radius: var(--radius); border: 0.5px solid var(--border);
    }
    .word-item .en { font-weight: 500; font-size: 14px; color: #fff; }
    .word-item .sep { color: var(--text3); margin: 0 6px; }
    .word-item .tr-text { font-size: 14px; color: var(--text2); }
    .word-item .del-btn { padding: 4px 8px; width: auto; font-size: 13px; }
    .empty-hint { font-size: 13px; color: var(--text3); text-align: center; padding: 1rem 0; }

    /* Game screens */
    .game-screen { display: none; }
    .game-screen.active { display: block; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text2); cursor: pointer;
      background: none; border: none; padding: 0; margin-bottom: 1rem;
      transition: color .15s;
    }
    .back-btn:hover { color: #fff; }

    /* Question card */
    .question-card {
      background: var(--surface2); border-radius: var(--radius-lg);
      padding: 1.5rem; margin-bottom: 1rem; text-align: center;
      border: 0.5px solid var(--border);
    }
    .question-en { font-size: 24px; font-weight: 500; margin-bottom: 4px; color: #fff; }
    .question-sub { font-size: 13px; color: var(--text2); }

    /* Word Guesser Layout Clues */
    .guess-word-clue { font-size: 26px; font-weight: 600; letter-spacing: 0.25em; color: var(--green-text); margin: 12px 0; font-family: monospace; }

    /* Choice buttons */
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .choice-btn {
      padding: 11px 16px; font-size: 14px; text-align: center;
      cursor: pointer; border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--surface2); color: var(--text);
      transition: all .2s; width: 100%;
    }
    .choice-btn:hover:not(:disabled) { background: #333333; border-color: rgba(255,255,255,0.25); }
    .choice-btn:disabled { cursor: default; }
    .choice-btn.correct-ans { background: var(--green-bg) !important; border-color: var(--green-border) !important; color: var(--green-text) !important; }
    .choice-btn.wrong-ans   { background: var(--red-bg)   !important; border-color: var(--red-border)   !important; color: var(--red-text)   !important; }

    /* Match grid */
    .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .match-col { display: flex; flex-direction: column; gap: 8px; }
    .match-col-title { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 2px; }
    .match-btn {
      padding: 10px; font-size: 14px; text-align: center;
      cursor: pointer; border: 0.5px solid var(--border2); border-radius: var(--radius);
      background: var(--surface2); color: var(--text); transition: all .2s; width: 100%;
    }
    .match-btn:hover:not(:disabled) { background: #333333; border-color: rgba(255,255,255,0.25); }
    .match-btn.selected   { border-color: var(--green); background: var(--green-bg); color: var(--green-text); }
    .match-btn.matched     { opacity: 0; pointer-events: none; transition: opacity .4s; }
    .match-btn.wrong-flash { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }

    /* Word Guess Form UI */
    .guess-form { display: flex; gap: 8px; margin-bottom: 12px; }
    .guess-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    /* End Screen Custom Layout */
    .end-screen-content { text-align: center; padding: 1.5rem 0; }
    .end-screen-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; color: var(--green-text); }
    .end-screen-text { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }

    /* Misc */
    .progress { font-size: 13px; color: var(--text3); text-align: right; margin-bottom: .75rem; }
    .next-btn-wrap { margin-top: 1rem; }

    @media (max-width: 480px) {
      .game-btns { grid-template-columns: 1fr; }
      .choices, .match-grid { grid-template-columns: 1fr; }
      .input-row { grid-template-columns: 1fr; }
      .guess-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="score-bar">
    <span class="brand">
      <i class="ti ti-brain" aria-hidden="true" style="font-size:20px"></i>
      Kelime Kartları
    </span>
    <div class="score-pills">
      <span class="pill correct"><i class="ti ti-check" aria-hidden="true"></i> <span id="score-correct">0</span></span>
      <span class="pill wrong"><i class="ti ti-x" aria-hidden="true"></i> <span id="score-wrong">0</span></span>
    </div>
  </div>

  <div id="alert-box" class="alert" role="alert"></div>

  <div id="main-screen">
    <div class="section">
      <div class="section-title"><i class="ti ti-plus" aria-hidden="true"></i> Kelime Ekle</div>
      <div class="input-row">
        <input type="text" id="inp-en" placeholder="İngilizce kelime..." aria-label="İngilizce kelime" />
        <input type="text" id="inp-tr" placeholder="Türkçe anlamı..."   aria-label="Türkçe anlam" />
      </div>
      <button class="btn primary" onclick="addWord()">
        <i class="ti ti-plus" aria-hidden="true"></i> Kelime Ekle
      </button>
      <div id="word-list" class="word-list"></div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-gamepad-2" aria-hidden="true"></i> Oyun Seç</div>
      <div class="game-btns">
        <button class="btn" onclick="startGame('match')">
          <i class="ti ti-arrows-shuffle" aria-hidden="true"></i> Eşleştirme
        </button>
        <button class="btn" onclick="startGame('quiz')">
          <i class="ti ti-list-check" aria-hidden="true"></i> Çoktan Seçmeli
        </button>
        <button class="btn" onclick="startGame('guess')">
          <i class="ti ti-abc" aria-hidden="true"></i> Harf Tahmin
        </button>
      </div>
    </div>
  </div>

  <div id="match-screen" class="game-screen" aria-label="Eşleştirme Oyunu">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Geri</button>
    <div class="section" id="match-body">
      <div class="section-title"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> Eşleştirme Oyunu</div>
      <p class="progress" id="match-progress"></p>
      <div class="match-grid">
        <div class="match-col">
          <div class="match-col-title">İngilizce</div>
          <div id="match-en"></div>
        </div>
        <div class="match-col">
          <div class="match-col-title">Türkçe</div>
          <div id="match-tr"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="quiz-screen" class="game-screen" aria-label="Çoktan Seçmeli Oyunu">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Geri</button>
    <div class="section" id="quiz-body">
      <div class="section-title"><i class="ti ti-list-check" aria-hidden="true"></i> Çoktan Seçmeli</div>
      <p class="progress" id="quiz-progress"></p>
      <div class="question-card">
        <div class="question-en" id="quiz-word"></div>
        <div class="question-sub">Bu kelimenin Türkçe anlamı nedir?</div>
      </div>
      <div class="choices" id="quiz-choices"></div>
      <div class="next-btn-wrap">
        <button class="btn" id="quiz-next" onclick="nextQuiz()">
          <i class="ti ti-arrow-right" aria-hidden="true"></i> Sonraki Soru
        </button>
      </div>
    </div>
  </div>

  <div id="guess-screen" class="game-screen" aria-label="Harf Tahmin Oyunu">
    <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left" aria-hidden="true"></i> Geri</button>
    <div class="section" id="guess-body">
      <div class="section-title"><i class="ti ti-abc" aria-hidden="true"></i> Harf Tahmin Oyunu</div>
      <p class="progress" id="guess-progress"></p>
      <div class="question-card">
        <div class="question-en" id="guess-word-en"></div>
        <div class="question-sub">Kelimesinin Türkçe karşılığını doldurun:</div>
        <div class="guess-word-clue" id="guess-clue-display"></div>
      </div>
      
      <div class="guess-form">
        <input type="text" id="inp-guess-answer" placeholder="Türkçe anlamını yazın..." aria-label="Tahmininiz" autocomplete="off" />
      </div>
      
      <div class="guess-actions">
        <button class="btn" id="btn-guess-hint" onclick="revealRandomLetter()">
          <i class="ti ti-bulb" aria-hidden="true"></i> Harf İste
        </button>
        <button class="btn danger-btn" id="btn-guess-giveup" onclick="giveUpAndShowAnswer()">
          Doğru Cevabı Gör
        </button>
        <button class="btn primary" id="btn-guess-submit" onclick="checkGuess()">
          Kontrol Et
        </button>
      </div>

      <div class="next-btn-wrap">
        <button class="btn" id="guess-next" onclick="nextGuess()" style="display:none">
          <i class="ti ti-arrow-right" aria-hidden="true"></i> Sonraki Soru
        </button>
      </div>
    </div>
  </div>

</div><script>
  let words = JSON.parse(localStorage.getItem('myFlashcards')) || [];
  let scoreCorrect = parseInt(localStorage.getItem('scoreCorrect')) || 0;
  let scoreWrong = parseInt(localStorage.getItem('scoreWrong')) || 0;

  let matchEnSel = null, matchTrSel = null, matchPairs = [];
  let quizQ = null, guessQ = null;
  
  let activeQuizWords = [];
  let activeGuessWords = [];
  let unplayedMatchWords = []; 
  let totalGameQuestions = 0;

  let currentRevealedArray = []; 

  updateScore();

  function showAlert(msg) {
    const a = document.getElementById('alert-box');
    a.textContent = msg;
    a.className = 'alert show';
    clearTimeout(a._t);
    a._t = setTimeout(() => { a.className = 'alert'; }, 3000);
  }

  function updateScore() {
    document.getElementById('score-correct').textContent = scoreCorrect;
    document.getElementById('score-wrong').textContent = scoreWrong;
    localStorage.setItem('scoreCorrect', scoreCorrect);
    localStorage.setItem('scoreWrong', scoreWrong);
  }

  function addWord() {
    const en = document.getElementById('inp-en').value.trim();
    const tr = document.getElementById('inp-tr').value.trim();

    if (!en || !tr) { showAlert('Lütfen her iki alanı da doldurun.'); return; }
    if (words.find(w => w.en.toLowerCase() === en.toLowerCase())) {
      showAlert('Bu kelime zaten listede var!'); return;
    }
    
    words.push({ en, tr });
    localStorage.setItem('myFlashcards', JSON.stringify(words));
    
    document.getElementById('inp-en').value = '';
    document.getElementById('inp-tr').value = '';
    document.getElementById('inp-en').focus();
    renderWordList();
  }

  function deleteWord(i) {
    words.splice(i, 1);
    localStorage.setItem('myFlashcards', JSON.stringify(words));
    renderWordList();
  }

  function renderWordList() {
    const el = document.getElementById('word-list');
    if (words.length === 0) {
      el.innerHTML = '<p class="empty-hint">Henüz kelime eklenmedi.</p>';
      return;
    }
    el.innerHTML = words.map((w, i) => `
      <div class="word-item">
        <span>
          <span class="en">${w.en}</span>
          <span class="sep">→</span>
          <span class="tr-text">${w.tr}</span>
        </span>
        <button class="btn danger-btn del-btn" onclick="deleteWord(${i})" aria-label="${w.en} kelimesini sil">
          <i class="ti ti-trash" aria-hidden="true"></i>
        </button>
      </div>`).join('');
  }

  function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

  function goBack() {
    document.getElementById('main-screen').style.display = '';
    document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
    matchEnSel = null; matchTrSel = null;
  }

  function startGame(mode) {
    if (words.length < 4) { showAlert('Lütfen önce en az 4 kelime ekleyin!'); return; }
    document.getElementById('main-screen').style.display = 'none';
    document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
    
    if (mode === 'match') {
      unplayedMatchWords = shuffle(words); 
      initMatch();
    }
    if (mode === 'quiz')  initQuiz();
    if (mode === 'guess') initGuess();
  }

  /* ── MATCH (EŞLEŞTİRME) ── */
  function resetMatchUI() {
    document.getElementById('match-body').innerHTML = `
      <div class="section-title"><i class="ti ti-arrows-shuffle" aria-hidden="true"></i> Eşleştirme Oyunu</div>
      <p class="progress" id="match-progress"></p>
      <div class="match-grid">
        <div class="match-col">
          <div class="match-col-title">İngilizce</div>
          <div id="match-en"></div>
        </div>
        <div class="match-col">
          <div class="match-col-title">Türkçe</div>
          <div id="match-tr"></div>
        </div>
      </div>
    `;
  }

  function initMatch() {
    const screen = document.getElementById('match-screen');
    screen.classList.add('active');
    
    if (unplayedMatchWords.length === 0) {
      showEndScreen('match-body', 'startGame("match")');
      return;
    }

    resetMatchUI();

    matchPairs = unplayedMatchWords.splice(0, Math.min(10, unplayedMatchWords.length));
    
    matchEnSel = null; 
    matchTrSel = null;
    
    const trShuffled = shuffle(matchPairs);
    
    document.getElementById('match-progress').textContent = `Bu tur: ${matchPairs.length} çift | Kalan Havuz: ${unplayedMatchWords.length + matchPairs.length}`;
    
    document.getElementById('match-en').innerHTML = matchPairs.map((w, i) =>
      `<button class="match-btn" data-idx="${i}" onclick="matchClick(this,'en',${i})">${w.en}</button>`
    ).join('');
    
    document.getElementById('match-tr').innerHTML = trShuffled.map(w =>
      `<button class="match-btn" data-word="${w.en}" onclick="matchClick(this,'tr','${w.en}')">${w.tr}</button>`
    ).join('');
  }

  function matchClick(btn, side, val) {
    if (btn.disabled || btn.classList.contains('matched')) return;
    if (side === 'en') {
      document.querySelectorAll('#match-en .match-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      matchEnSel = { btn, idx: val };
    } else {
      document.querySelectorAll('#match-tr .match-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      matchTrSel = { btn, word: val };
    }
    if (!matchEnSel || !matchTrSel) return;
    const correct = matchPairs[matchEnSel.idx].en === matchTrSel.word;
    if (correct) {
      scoreCorrect++; updateScore();
      matchEnSel.btn.classList.add('matched');
      matchTrSel.btn.classList.add('matched');
      matchEnSel = null; matchTrSel = null;
      
      const remaining = document.querySelectorAll('.match-btn:not(.matched)').length;
      if (remaining === 0) {
        setTimeout(() => { 
          showAlert('🎉 Tur tamamlandı! Yeni kelimeler getiriliyor...'); 
          initMatch(); 
        }, 600);
      }
    } else {
      scoreWrong++; updateScore();
      matchEnSel.btn.classList.add('wrong-flash');
      matchTrSel.btn.classList.add('wrong-flash');
      const en = matchEnSel.btn, tr = matchTrSel.btn;
      setTimeout(() => {
        en.classList.remove('selected', 'wrong-flash');
        tr.classList.remove('selected', 'wrong-flash');
        matchEnSel = null; matchTrSel = null;
      }, 700);
    }
  }

  /* ── QUIZ ── */
  function initQuiz() {
    document.getElementById('quiz-screen').classList.add('active');
    activeQuizWords = shuffle(words);
    totalGameQuestions = words.length;
    resetQuizUI();
    nextQuiz();
  }

  function resetQuizUI() {
    document.getElementById('quiz-body').innerHTML = `
      <div class="section-title"><i class="ti ti-list-check" aria-hidden="true"></i> Çoktan Seçmeli</div>
      <p class="progress" id="quiz-progress"></p>
      <div class="question-card">
        <div class="question-en" id="quiz-word"></div>
        <div class="question-sub">Bu kelimenin Türkçe anlamı nedir?</div>
      </div>
      <div class="choices" id="quiz-choices"></div>
      <div class="next-btn-wrap">
        <button class="btn" id="quiz-next" onclick="nextQuiz()">
          <i class="ti ti-arrow-right" aria-hidden="true"></i> Sonraki Soru
        </button>
      </div>
    `;
  }

  function nextQuiz() {
    if (activeQuizWords.length === 0) {
      showEndScreen('quiz-body', 'initQuiz()');
      return;
    }
    document.getElementById('quiz-next').style.display = 'none';
    const currentNum = totalGameQuestions - activeQuizWords.length + 1;
    document.getElementById('quiz-progress').textContent = `${currentNum} / ${totalGameQuestions}`;

    quizQ = activeQuizWords.pop();
    document.getElementById('quiz-word').textContent = quizQ.en;
    
    const wrong = shuffle(words.filter(w => w.en !== quizQ.en)).slice(0, 3);
    const opts = shuffle([quizQ, ...wrong]);
    document.getElementById('quiz-choices').innerHTML = opts.map(o =>
      `<button class="choice-btn" onclick="checkQuiz(this,'${o.en}')">${o.tr}</button>`
    ).join('');
  }

  function checkQuiz(btn, en) {
    document.querySelectorAll('#quiz-choices .choice-btn').forEach(b => b.disabled = true);
    if (en === quizQ.en) {
      scoreCorrect++; btn.classList.add('correct-ans');
    } else {
      scoreWrong++; btn.classList.add('wrong-ans');
      document.querySelectorAll('#quiz-choices .choice-btn').forEach(b => {
        if (b.textContent === quizQ.tr) b.classList.add('correct-ans');
      });
    }
    updateScore();
    document.getElementById('quiz-next').style.display = '';
  }

  /* ── HARF TAHMİN (GUESS) ── */
  function initGuess() {
    document.getElementById('guess-screen').classList.add('active');
    activeGuessWords = shuffle(words);
    totalGameQuestions = words.length;
    resetGuessUI();
    nextGuess();
  }

  function resetGuessUI() {
    document.getElementById('guess-body').innerHTML = `
      <div class="section-title"><i class="ti ti-abc" aria-hidden="true"></i> Harf Tahmin Oyunu</div>
      <p class="progress" id="guess-progress"></p>
      <div class="question-card">
        <div class="question-en" id="guess-word-en"></div>
        <div class="question-sub">Kelimesinin Türkçe karşılığını doldurun:</div>
        <div class="guess-word-clue" id="guess-clue-display"></div>
      </div>
      <div class="guess-form">
        <input type="text" id="inp-guess-answer" placeholder="Türkçe anlamını yazın..." aria-label="Tahmininiz" autocomplete="off" />
      </div>
      <div class="guess-actions">
        <button class="btn" id="btn-guess-hint" onclick="revealRandomLetter()">
          <i class="ti ti-bulb" aria-hidden="true"></i> Harf İste
        </button>
        <button class="btn danger-btn" id="btn-guess-giveup" onclick="giveUpAndShowAnswer()">
          Doğru Cevabı Gör
        </button>
        <button class="btn primary" id="btn-guess-submit" onclick="checkGuess()">
          Kontrol Et
        </button>
      </div>
      <div class="next-btn-wrap">
        <button class="btn" id="guess-next" onclick="nextGuess()" style="display:none">
          <i class="ti ti-arrow-right" aria-hidden="true"></i> Sonraki Soru
        </button>
      </div>
    `;
    
    document.getElementById('inp-guess-answer').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !document.getElementById('inp-guess-answer').disabled) {
        checkGuess();
      }
    });
  }

  function nextGuess() {
    if (activeGuessWords.length === 0) {
      showEndScreen('guess-body', 'initGuess()');
      return;
    }
    
    document.getElementById('guess-clue-display').style.color = 'var(--green-text)';
    document.getElementById('inp-guess-answer').value = '';
    document.getElementById('inp-guess-answer').disabled = false;
    document.getElementById('btn-guess-hint').disabled = false;
    document.getElementById('btn-guess-giveup').disabled = false;
    document.getElementById('btn-guess-submit').disabled = false;
    document.getElementById('guess-next').style.display = 'none';

    const currentNum = totalGameQuestions - activeGuessWords.length + 1;
    document.getElementById('guess-progress').textContent = `${currentNum} / ${totalGameQuestions}`;

    guessQ = activeGuessWords.pop();
    document.getElementById('guess-word-en').textContent = guessQ.en;

    currentRevealedArray = [];
    for (let i = 0; i < guessQ.tr.length; i++) {
      if (guessQ.tr[i] === ' ') {
        currentRevealedArray.push(' ');
      } else if (i === 0) {
        currentRevealedArray.push(guessQ.tr[0]); 
      } else {
        currentRevealedArray.push('_');
      }
    }
    renderGuessClue();
    document.getElementById('inp-guess-answer').focus();
  }

  function renderGuessClue() {
    document.getElementById('guess-clue-display').textContent = currentRevealedArray.join(' ');
  }

  function revealRandomLetter() {
    let hiddenIndices = [];
    for (let i = 0; i < currentRevealedArray.length; i++) {
      if (currentRevealedArray[i] === '_') hiddenIndices.push(i);
    }
    
    if (hiddenIndices.length > 0) {
      let randIdx = hiddenIndices[Math.floor(Math.random() * hiddenIndices.length)];
      currentRevealedArray[randIdx] = guessQ.tr[randIdx];
      renderGuessClue();
    }
  }

  function checkGuess() {
    const userAns = document.getElementById('inp-guess-answer').value.trim().toLowerCase();
    const targetAns = guessQ.tr.trim().toLowerCase();
    
    if (!userAns) { showAlert('Lütfen bir tahmin yazın!'); return; }

    if (userAns === targetAns) {
      scoreCorrect++;
      updateScore();
      
      document.getElementById('guess-clue-display').style.color = 'var(--green)';
      document.getElementById('guess-clue-display').textContent = guessQ.tr;
      
      document.getElementById('inp-guess-answer').disabled = true;
      document.getElementById('btn-guess-hint').disabled = true;
      document.getElementById('btn-guess-giveup').disabled = true;
      document.getElementById('btn-guess-submit').disabled = true;
      document.getElementById('guess-next').style.display = '';
      document.getElementById('guess-next').focus();
    } 
    else {
      showAlert('❌ Yanlış Cevap! Tekrar deneyin.');
      document.getElementById('guess-clue-display').style.color = 'var(--red-text)';
      document.getElementById('inp-guess-answer').value = '';
      document.getElementById('inp-guess-answer').focus();
    }
  }

  function giveUpAndShowAnswer() {
    scoreWrong++;
    updateScore();

    document.getElementById('guess-clue-display').style.color = 'var(--red-text)';
    document.getElementById('guess-clue-display').textContent = `Doğru Cevap: ${guessQ.tr}`;

    document.getElementById('inp-guess-answer').disabled = true;
    document.getElementById('btn-guess-hint').disabled = true;
    document.getElementById('btn-guess-giveup').disabled = true;
    document.getElementById('btn-guess-submit').disabled = true;
    
    document.getElementById('guess-next').style.display = '';
    document.getElementById('guess-next').focus();
  }

  /* ── BİTİŞ EKRANI ── */
  function showEndScreen(containerId, retryFunction) {
    const container = document.getElementById(containerId);
    container.innerHTML = `
      <div class="end-screen-content">
        <i class="ti ti-trophy" style="font-size: 48px; color: #eab308; margin-bottom: 12px; display: inline-block;"></i>
        <div class="end-screen-title">Tebrikler!</div>
        <p class="end-screen-text">Listedeki tüm kelimeleri başarıyla tamamladınız.</p>
        <button class="btn primary" onclick="${retryFunction}">
          <i class="ti ti-refresh" aria-hidden="true"></i> Yeniden Oyna
        </button>
      </div>
    `;
  }

  /* ── Klavye Kısayolları ── */
  document.getElementById('inp-en').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-tr').focus(); });
  document.getElementById('inp-tr').addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

  renderWordList();
</script>
</body>
</html>
